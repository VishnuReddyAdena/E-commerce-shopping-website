services:
  # Backend Web Service configuration
  - type: web
    name: nexacart-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5050
      - key: CLIENT_URL
        sync: false
        placeholder: "https://your-frontend-static-site.onrender.com"
      - key: MONGODB_URI
        sync: false
        placeholder: "mongodb+srv://user:pass@cluster.mongodb.net/nexacart"
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
        placeholder: "your-supabase-url"
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        placeholder: "your-supabase-service-role-key"

  # Frontend Static Site configuration
  - type: web
    name: nexacart-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Rewrite rule to route all requests to index.html for React Router SPA
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        sync: false
        placeholder: "https://your-backend-service.onrender.com"
      - key: VITE_SUPABASE_URL
        sync: false
        placeholder: "your-supabase-url"
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
        placeholder: "your-supabase-anon-key"
